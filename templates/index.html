<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profit Predictor</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: #161b22;
    padding: 30px;
    border-radius: 12px;
    width: 400px;
    border: 1px solid #30363d;
}

h2 {
    text-align: center;
    margin-bottom: 25px;
}

label {
    font-size: 14px;
    margin-bottom: 6px;
    display: block;
    color: #8b949e;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-bottom: 18px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #e6edf3;
}

input:focus, select:focus {
    outline: none;
    border-color: #58a6ff;
}

button {
    width: 100%;
    padding: 12px;
    background: #238636;
    border: none;
    border-radius: 6px;
    color: white;
    font-weight: 600;
    cursor: pointer;
}

button:hover {
    background: #2ea043;
}

.result {
    margin-top: 20px;
    text-align: center;
    font-size: 18px;
    font-weight: 500;
}
</style>
</head>

<body>

<div class="container">
    <h2>Profit Predictor</h2>

    <form action="/predict" method="POST">

        <label>State Florida</label>
        <select name="state_florida" required>
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select>

        <label>State New York</label>
        <select name="state_newyork" required>
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select>

        <label>R&D Spend</label>
        <input type="number" step="any" name="rd_spend" required>

        <label>Administration</label>
        <input type="number" step="any" name="administration" required>

        <label>Marketing Spend</label>
        <input type="number" step="any" name="marketing_spend" required>

        <button type="submit">Predict Profit</button>
    </form>

    <div class="result">
        {{ prediction_text }}
    </div>
</div>

</body>
</html>
